<!DOCTYPE html>
<html>
<head><title>Fale Conosco - Cafeteria</title></head>
<body>
    <h1>Entre em Contato</h1>
    <form>
        Nome: <input type="text" name="nome"><br><br>
        
        Você já é cliente? 
        <input type="radio" name="cliente" value="sim"> Sim
        <input type="radio" name="cliente" value="nao"> Não<br><br>

        Assunto: 
        <select name="assunto">
            <option>Reserva de mesa</option>
            <option>Dúvida sobre cardápio</option>
            <option>Elogio</option>
            <option>Reclamação</option>
        </select><br><br>

        Mensagem: <br>
        <textarea name="msg" rows="5" cols="30"></textarea><br><br>

        <input type="submit" value="Enviar Mensagem">
    </form>
    <br>
    <a href="index.html">Voltar ao início</a>
</body>
</html>
